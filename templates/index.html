<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chatbot - La Station</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 40px;
      max-width: 700px;
      margin: auto;
    }

    h1 {
      color: #222;
      text-align: center;
    }

    #chatbox {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      min-height: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .message {
      margin-bottom: 16px;
    }

    .user {
      color: #007acc;
      font-weight: bold;
    }

    .bot {
      color: #333;
    }

    .bot strong {
      color: #000;
    }

    input, button {
      padding: 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    input {
      width: 75%;
    }

    button {
      width: 22%;
      margin-left: 2%;
      cursor: pointer;
      background-color: #007acc;
      color: white;
      border: none;
    }

    button:hover {
      background-color: #005e99;
    }

    #loader {
      display: none;
      text-align: center;
      font-style: italic;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>🤖 Chatbot de La Station</h1>

  <div id="chatbox"></div>
  <div id="loader">⏳ Le bot réfléchit...</div>

  <input id="userInput" type="text" placeholder="Posez une question..." />
  <button onclick="sendMessage()">Envoyer</button>

  <script>
    async function sendMessage() {
      const input = document.getElementById("userInput");
      const chatbox = document.getElementById("chatbox");
      const loader = document.getElementById("loader");
      const message = input.value.trim();

      if (!message) return;

      chatbox.innerHTML += `<div class="message user">🧑‍💻 <strong>Vous :</strong> ${message}</div>`;
      input.value = "";
      loader.style.display = "block";

      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: message })
        });

        const data = await res.json();

        chatbox.innerHTML += `<div class="message bot">🤖 <strong>Bot :</strong> <span>${data.answer}</span></div>`;
        chatbox.scrollTop = chatbox.scrollHeight;
      } catch (err) {
        chatbox.innerHTML += `<div class="message bot">❌ <strong>Erreur :</strong> impossible de contacter le serveur.</div>`;
        console.error(err);
      } finally {
        loader.style.display = "none";
      }
    }
  </script>
</body>
</html>
